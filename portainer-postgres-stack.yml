version: "3.8"

services:
  axon_postgres:
    image: postgres:16-alpine
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    environment:
      POSTGRES_DB: axon_ops
      POSTGRES_USER: axon_app
      POSTGRES_PASSWORD: CHANGE_THIS_STRONG_PASSWORD
    volumes:
      - axon_postgres_data:/var/lib/postgresql/data
    networks:
      - network_swarm_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first

volumes:
  axon_postgres_data:

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
