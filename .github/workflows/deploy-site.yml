name: Deploy site image

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "server/**"
      - "server.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - "nginx.conf"
      - ".github/workflows/deploy-site.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/axnconsult/site:main
            ghcr.io/axnconsult/site:sha-${{ github.sha }}

      - name: Deploy to VPS via SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -T 10 "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -o ConnectTimeout=10 -i ~/.ssh/deploy_key "root@$VPS_HOST" \
            "docker service update --image ghcr.io/axnconsult/site:sha-${{ github.sha }} axon-site_axon_site"
