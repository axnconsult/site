services:
  axon-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axon-site
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.axon-site.rule=Host(`axnconsult.com.br`)"
      - "traefik.http.routers.axon-site.entrypoints=web,websecure"
      - "traefik.http.routers.axon-site.tls=true"
      - "traefik.http.routers.axon-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.axon-site.loadbalancer.server.port=80"

networks:
  traefik-public:
    external: true
