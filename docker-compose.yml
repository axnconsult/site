services:
  axon-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axon-site
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      - "traefik.http.routers.axon-site.rule=Host(`axnconsult.com.br`)"
      - "traefik.http.routers.axon-site.entrypoints=web,websecure"
      - "traefik.http.routers.axon-site.tls=true"
      - "traefik.http.routers.axon-site.tls.certresolver=mytlschallenge"
      - "traefik.http.services.axon-site.loadbalancer.server.port=80"

networks:
  n8n_default:
    external: true
