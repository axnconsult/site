version: "3.7"

services:
  axon_site:
    image: ghcr.io/axnconsult/site:main
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    environment:
      NODE_ENV: production
      PORT: "80"
      # --- Segredos: substituir antes de colar no Portainer ---
      DATABASE_URL: "postgres://axon_app:SENHA_DO_POSTGRES@axon_postgres:5432/axon_ops"
      OPENAI_API_KEY: "sk-..."
      # ---------------------------------------------------------
      OPERATION_ASSISTANT_PROVIDER: "agents"
      OPERATION_ASSISTANT_STRICT: "true"
      OPERATION_AGENT_MODEL: "gpt-5.5"
      OPERATION_AGENT_REASONING_EFFORT: "low"
    networks:
      - network_swarm_public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_swarm_public"
        - "traefik.http.routers.axon_site.rule=Host(`axnconsult.com.br`) || Host(`www.axnconsult.com.br`)"
        - "traefik.http.routers.axon_site.entrypoints=websecure"
        - "traefik.http.routers.axon_site.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.axon_site.service=axon_site"
        - "traefik.http.services.axon_site.loadbalancer.server.port=80"
        - "traefik.http.services.axon_site.loadbalancer.passHostHeader=true"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
